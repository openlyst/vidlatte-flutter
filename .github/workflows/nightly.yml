name: Nightly Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            build_cmd: flutter build apk --release
            artifact_path: build/app/outputs/flutter-apk
            artifact_name: vidlatte-android
          - target: web
            os: ubuntu-latest
            build_cmd: flutter build web --release
            artifact_path: build/web
            artifact_name: vidlatte-web
          - target: linux
            os: ubuntu-latest
            build_cmd: flutter build linux --release
            artifact_path: build/linux/x64/release/bundle
            artifact_name: vidlatte-linux
          - target: macos
            os: macos-latest
            build_cmd: flutter build macos --release
            artifact_path: build/macos/Build/Products/Release
            artifact_name: vidlatte-macos
          - target: ios
            os: macos-latest
            build_cmd: flutter build ios --release --no-codesign
            artifact_path: build/ios/ipa
            artifact_name: vidlatte-ios
          - target: windows
            os: windows-latest
            build_cmd: flutter build windows --release
            artifact_path: build/windows/x64/runner/Release
            artifact_name: vidlatte-windows

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build ${{ matrix.target }}
        run: ${{ matrix.build_cmd }}

      - name: Compress artifact
        if: matrix.target != 'android'
        run: |
          cd ${{ matrix.artifact_path }}
          if [ "${{ matrix.target }}" = "web" ]; then
            tar -czf ../../../${{ matrix.artifact_name }}.tar.gz .
          else
            tar -czf ../../../${{ matrix.artifact_name }}.tar.gz .
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_path }}/*.apk
            ${{ matrix.artifact_path }}/*.tar.gz
            ${{ matrix.artifact_name }}.tar.gz
          if-no-files-found: ignore

  release:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.apk" -o -name "*.tar.gz" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Delete existing nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          body: |
            Automated nightly build from commit ${{ github.sha }}

            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Built on:** ${{ github.event.head_commit.timestamp }}

            > This release is automatically updated on every push. Artifacts are untested nightly builds.
          prerelease: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
