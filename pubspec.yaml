name: vidlatte
description: "Standalone AI image generation app powered by ComfyUI"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0

  # Navigation
  go_router: ^14.6.0

  # HTTP/Networking
  dio: ^5.8.0
  web_socket_channel: ^3.0.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.2
  path_provider: ^2.1.5

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  photo_view: ^0.15.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
